<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skintel — TikTok 10s</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }

  #canvas {
    position: relative;
    width: 405px;
    height: 720px;
    overflow: hidden;
    background: #F4EDE0;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }

  /* ── SCENE BASE ── */
  .scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
  }

  /* ─────────────────────────────────────────
     SCENE 1: HOOK  (0 – 2.2s)
     ───────────────────────────────────────── */
  #s1 {
    background: #1A1814;
    animation: s1-in 0.05s ease forwards, s1-out 0.2s ease 2.0s forwards;
  }
  @keyframes s1-in  { to { opacity: 1; } }
  @keyframes s1-out { to { opacity: 0; } }

  #s1 .line {
    font-family: 'Instrument Serif', serif;
    color: #F4EDE0;
    text-align: center;
    line-height: 1.2;
    opacity: 0;
  }
  #s1 .line1 { font-size: 38px; animation: word-pop 0.3s cubic-bezier(.34,1.56,.64,1) 0.1s forwards; }
  #s1 .line2 { font-size: 38px; animation: word-pop 0.3s cubic-bezier(.34,1.56,.64,1) 0.45s forwards; }
  #s1 .line3 { font-size: 38px; animation: word-pop 0.3s cubic-bezier(.34,1.56,.64,1) 0.8s forwards; }
  #s1 .emoji { font-size: 48px; animation: word-pop 0.4s cubic-bezier(.34,1.56,.64,1) 1.15s forwards; margin-top: 10px; }

  @keyframes word-pop {
    0%   { opacity: 0; transform: scale(0.7) translateY(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ─────────────────────────────────────────
     SCENE 2: BRAND REVEAL  (2.2 – 4.7s)
     ───────────────────────────────────────── */
  #s2 {
    background: #F4EDE0;
    animation: s2-in 0.25s ease 2.2s forwards, s2-out 0.2s ease 4.5s forwards;
  }
  @keyframes s2-in  { to { opacity: 1; } }
  @keyframes s2-out { to { opacity: 0; } }

  #s2 .brand-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #s2 .logo-pill {
    background: #A35848;
    border-radius: 14px;
    padding: 10px 32px;
    opacity: 0;
    transform: translateY(30px);
    animation: slide-up 0.5s cubic-bezier(.34,1.4,.64,1) 2.4s forwards;
  }
  #s2 .logo-text {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 52px;
    color: #F4EDE0;
    letter-spacing: -1px;
  }

  #s2 .tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #6B6760;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    opacity: 0;
    animation: fade-in 0.5s ease 2.9s forwards;
  }

  #s2 .divider {
    width: 40px;
    height: 2px;
    background: #A35848;
    opacity: 0;
    animation: fade-in 0.4s ease 3.1s forwards;
  }

  #s2 .sub {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: #1A1814;
    text-align: center;
    line-height: 1.4;
    max-width: 280px;
    opacity: 0;
    animation: fade-in 0.5s ease 3.3s forwards;
  }

  @keyframes slide-up {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    to { opacity: 1; }
  }

  /* ─────────────────────────────────────────
     SCENE 3: INGREDIENT SCAN  (4.7 – 7.6s)
     ───────────────────────────────────────── */
  #s3 {
    background: #F4EDE0;
    padding: 0 28px;
    animation: s3-in 0.25s ease 4.7s forwards, s3-out 0.2s ease 7.4s forwards;
  }
  @keyframes s3-in  { to { opacity: 1; } }
  @keyframes s3-out { to { opacity: 0; } }

  #s3 .scan-header {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #6B6760;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fade-in 0.3s ease 4.85s forwards;
  }

  .ingr-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #FFFEFA;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
    opacity: 0;
    transform: translateX(-20px);
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(26,24,20,0.06);
  }
  .ingr-row::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(163,88,72,0.12) 50%, transparent 100%);
    transform: translateX(-100%);
  }

  .ingr-row:nth-child(2) { animation: row-in 0.35s cubic-bezier(.34,1.4,.64,1) 5.0s forwards; }
  .ingr-row:nth-child(3) { animation: row-in 0.35s cubic-bezier(.34,1.4,.64,1) 5.4s forwards; }
  .ingr-row:nth-child(4) { animation: row-in 0.35s cubic-bezier(.34,1.4,.64,1) 5.8s forwards; }

  .ingr-row:nth-child(2)::after { animation: scan-sweep 0.5s ease 5.0s forwards; }
  .ingr-row:nth-child(3)::after { animation: scan-sweep 0.5s ease 5.4s forwards; }
  .ingr-row:nth-child(4)::after { animation: scan-sweep 0.5s ease 5.8s forwards; }

  @keyframes row-in {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes scan-sweep {
    0%   { transform: translateX(-100%); opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
  }

  .ingr-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #1A1814;
    max-width: 185px;
    line-height: 1.3;
  }

  .verdict-pill {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    padding: 5px 11px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .verdict-safe    { background: #EEF2DD; color: #5C7A4F; }
  .verdict-trigger { background: #FDEAEA; color: #B22B2B; }
  .verdict-unsure  { background: #FFF4E0; color: #8B6914; }

  /* ─────────────────────────────────────────
     SCENE 4: CTA  (7.6 – 10s)
     ───────────────────────────────────────── */
  #s4 {
    background: #A35848;
    flex-direction: column;
    gap: 0;
    animation: s4-in 0.3s ease 7.6s forwards;
  }
  @keyframes s4-in { to { opacity: 1; } }

  #s4 .cta-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 0 36px;
  }

  #s4 .cta-headline {
    font-family: 'Instrument Serif', serif;
    font-size: 52px;
    color: #F4EDE0;
    text-align: center;
    line-height: 1.1;
    letter-spacing: -1px;
    opacity: 0;
    animation: cta-up 0.5s cubic-bezier(.34,1.4,.64,1) 7.8s forwards;
  }

  #s4 .cta-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: rgba(244,237,224,0.75);
    text-align: center;
    letter-spacing: 0.3px;
    opacity: 0;
    animation: fade-in 0.4s ease 8.2s forwards;
  }

  #s4 .cta-url-bar {
    background: #F4EDE0;
    border-radius: 50px;
    padding: 12px 32px;
    opacity: 0;
    animation: cta-up 0.4s cubic-bezier(.34,1.4,.64,1) 8.5s forwards;
  }

  #s4 .cta-url {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #A35848;
    letter-spacing: -0.3px;
  }

  @keyframes cta-up {
    0%   { opacity: 0; transform: translateY(24px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ── PROGRESS BAR ── */
  #progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: #A35848;
    border-radius: 0 0 20px 20px;
    width: 0%;
    animation: progress-fill 10s linear forwards;
  }
  @keyframes progress-fill { to { width: 100%; } }

  /* ── REPLAY BUTTON ── */
  #replay {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(26,24,20,0.5);
    border: none;
    color: #F4EDE0;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 13px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.5px;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  #replay:hover { background: rgba(26,24,20,0.75); }
</style>
</head>
<body>
<div id="canvas">

  <!-- SCENE 1: HOOK -->
  <div class="scene" id="s1">
    <div class="line line1">Why does this</div>
    <div class="line line2">keep breaking</div>
    <div class="line line3">me out?</div>
    <div class="line emoji">😩</div>
  </div>

  <!-- SCENE 2: BRAND REVEAL -->
  <div class="scene" id="s2">
    <div class="brand-card">
      <div class="logo-pill">
        <span class="logo-text">skintel</span>
      </div>
      <div class="tagline">Skincare Ingredient Intelligence</div>
      <div class="divider"></div>
      <div class="sub">Track products.<br>Find your triggers.</div>
    </div>
  </div>

  <!-- SCENE 3: INGREDIENT SCAN -->
  <div class="scene" id="s3">
    <div class="scan-header">Analyzing ingredients…</div>
    <div class="ingr-row">
      <span class="ingr-name">Niacinamide</span>
      <span class="verdict-pill verdict-safe">SAFE ✓</span>
    </div>
    <div class="ingr-row">
      <span class="ingr-name">Sodium Lauryl Sulfate</span>
      <span class="verdict-pill verdict-trigger">TRIGGER ✗</span>
    </div>
    <div class="ingr-row">
      <span class="ingr-name">Hyaluronic Acid</span>
      <span class="verdict-pill verdict-safe">SAFE ✓</span>
    </div>
  </div>

  <!-- SCENE 4: CTA -->
  <div class="scene" id="s4">
    <div class="cta-inner">
      <div class="cta-headline">Stop guessing.<br>Start knowing.</div>
      <div class="cta-sub">Track ingredients · Find your triggers</div>
      <div class="cta-url-bar">
        <span class="cta-url">skintel.app</span>
      </div>
    </div>
  </div>

  <div id="progress"></div>

  <button id="replay" onclick="location.reload()">↺ Replay</button>
</div>
</body>
</html>
